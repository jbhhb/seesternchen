# ─────────────────────────────────────────────
#  Netlify-Konfiguration – Ferienwohnung Seesternchen
#  https://fewo-seesternchen.de
# ─────────────────────────────────────────────

[build]
  publish = "."                      # Root-Verzeichnis ist der Build-Output
  command = ""                       # Kein Build-Schritt nötig (reines HTML)
  functions = "netlify/functions"    # Serverless Functions für iCal-Proxy

# ── Produktions-Kontext ──────────────────────
[context.production]
  environment = { NODE_VERSION = "20" }

# ── HTTP-Response-Header ────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Sicherheit
    X-Frame-Options            = "DENY"
    X-Content-Type-Options     = "nosniff"
    X-XSS-Protection           = "1; mode=block"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=()"

    # Cache-Control für HTML (kurze TTL, damit Updates schnell ankommen)
    Cache-Control = "public, max-age=0, must-revalidate"

# Statische Assets (Bilder, Fonts, CSS) – längeres Caching
[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Weiterleitungen ─────────────────────────
# non-www → www (kanonische URL ist www.fewo-seesternchen.de)
[[redirects]]
  from   = "https://fewo-seesternchen.de/*"
  to     = "https://www.fewo-seesternchen.de/:splat"
  status = 301
  force  = true

# Dankesseite nach Formular-Submit
[[redirects]]
  from   = "/danke"
  to     = "/danke.html"
  status = 200

# Catch-All: 404-Seite
[[redirects]]
  from   = "/*"
  to     = "/404.html"
  status = 404
