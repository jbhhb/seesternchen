# ─────────────────────────────────────────────
#  Netlify-Konfiguration – Ferienwohnung Seesternchen
#  https://fewo-seesternchen.de
# ─────────────────────────────────────────────

[build]
  publish = "."
  command = "python3 -c \"import os; addr=os.environ.get('IMPRESSUM_ADRESSE',''); f=open('impressum/index.html','r',encoding='utf-8'); c=f.read(); f.close(); c=c.replace('[ADRESSE]',addr); f=open('impressum/index.html','w',encoding='utf-8'); f.write(c); f.close()\""
  functions = "netlify/functions"

# ── Produktions-Kontext ──────────────────────
[context.production]
  environment = { NODE_VERSION = "20" }

# ── HTTP-Response-Header ────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Sicherheit
    X-Frame-Options            = "DENY"
    X-Content-Type-Options     = "nosniff"
    X-XSS-Protection           = "1; mode=block"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=()"

    # Cache-Control für HTML (kurze TTL, damit Updates schnell ankommen)
    Cache-Control = "public, max-age=0, must-revalidate"

# Statische Assets (Bilder, Fonts, CSS) – längeres Caching
[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Weiterleitungen ─────────────────────────
# www → non-www
[[redirects]]
  from   = "https://www.fewo-seesternchen.de/*"
  to     = "https://fewo-seesternchen.de/:splat"
  status = 301
  force  = true

# Dankesseite nach Formular-Submit
[[redirects]]
  from   = "/danke"
  to     = "/danke.html"
  status = 200

# Impressum: alte .html-URL auf Verzeichnis-URL
[[redirects]]
  from   = "/impressum.html"
  to     = "/impressum/"
  status = 301

# Catch-All: 404-Seite
[[redirects]]
  from   = "/*"
  to     = "/404.html"
  status = 404
