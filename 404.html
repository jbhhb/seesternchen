<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seite nicht gefunden – Ferienwohnung Seesternchen</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(160deg, #0e3b5c 0%, #1a6b9a 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      color: #fff;
      text-align: center;
    }
    .card {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 56px 40px;
      max-width: 480px;
      backdrop-filter: blur(8px);
    }
    .code { font-size: 5rem; font-family: 'Playfair Display', serif; opacity: 0.4; margin-bottom: 8px; }
    h1   { font-family: 'Playfair Display', serif; font-size: 1.8rem; margin-bottom: 16px; }
    p    { color: rgba(255,255,255,0.8); margin-bottom: 32px; line-height: 1.7; }
    a.btn {
      display: inline-block;
      background: #e8753a;
      color: #fff;
      padding: 14px 32px;
      border-radius: 50px;
      font-weight: 600;
      text-decoration: none;
      transition: background .2s;
    }
    a.btn:hover { background: #c45f28; }
  </style>
</head>
<body>
  <div class="card">
    <div class="code">404</div>
    <h1>Seite nicht gefunden</h1>
    <p>Diese Seite existiert leider nicht. Vielleicht habt ihr euch vertippt – oder die Seite wurde verschoben.</p>
    <a href="/" class="btn">Zurück zur Startseite</a>
  </div>
</body>
</html>
