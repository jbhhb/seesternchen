<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anfrage erhalten – Ferienwohnung Seesternchen</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;500;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;500;600&display=swap" /></noscript>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0e3b5c; --ocean: #1a6b9a; --coral: #e8753a; --white: #ffffff;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(160deg, #0e3b5c 0%, #1a6b9a 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      color: var(--white);
      text-align: center;
    }
    .card {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 56px 40px;
      max-width: 520px;
      backdrop-filter: blur(8px);
    }
    .icon { font-size: 3.5rem; margin-bottom: 24px; }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      margin-bottom: 16px;
      color: var(--white);
    }
    p { color: rgba(255,255,255,0.82); line-height: 1.7; margin-bottom: 32px; }
    a.btn {
      display: inline-block;
      background: var(--coral);
      color: var(--white);
      padding: 14px 32px;
      border-radius: 50px;
      font-weight: 600;
      text-decoration: none;
      font-size: 1rem;
      transition: background .2s;
    }
    a.btn:hover { background: #c45f28; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🌊</div>
    <h1>Danke für eure Anfrage!</h1>
    <p>Wir haben eure Nachricht erhalten und melden uns innerhalb eines Tages bei euch. Wir freuen uns, euch im Seesternchen begrüßen zu dürfen!</p>
    <a href="/" class="btn">Zurück zur Startseite</a>
  </div>
</body>
</html>
